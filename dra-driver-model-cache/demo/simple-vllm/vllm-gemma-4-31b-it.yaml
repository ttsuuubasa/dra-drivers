apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gemma-4-31b-it-gpu
spec:
  spec:
    devices:
      requests:
      - name: gpu
        firstAvailable:
        - name: a100-80gb
          allocationMode: ExactCount
          count: 1
          deviceClassName: gpu.nvidia.com
          selectors:
          - cel:
              expression: "device.attributes['gpu.nvidia.com'].productName == 'NVIDIA A100-SXM4-80GB'"
        - name: a100-40gb-2x
          allocationMode: ExactCount
          count: 2
          deviceClassName: gpu.nvidia.com
          selectors:
          - cel:
              expression: "device.attributes['gpu.nvidia.com'].productName == 'NVIDIA A100-SXM4-40GB'"
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gemma-4-31b-it-model
spec:
  spec:
    devices:
      requests:
      - name: model
        firstAvailable:
        - name: cached-model
          deviceClassName: cached.modelcache.x-k8s.io
          selectors:
          - cel:
              expression: "device.attributes['modelcache.x-k8s.io'].id == 'google/gemma-4-31B-it'"
        - name: huggingface-model
          deviceClassName: hf.modelcache.x-k8s.io
      config:
      - requests: ["model"]
        opaque:
          driver: modelcache.x-k8s.io
          parameters:
            apiVersion: modelcache.x-k8s.io/v1
            kind: ModelLoader
            provider: huggingface
            modelId: google/gemma-4-31B-it
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gemma-4-31b-it
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-gemma-4-31b-it
  template:
    metadata:
      labels:
        app: vllm-gemma-4-31b-it
    spec:
      nodeSelector:
        cloud.google.com/compute-class: vllm-gpu-ccc
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: gemma-4-31b-it-gpu
      - name: model
        resourceClaimTemplateName: gemma-4-31b-it-model
      containers:
      - name: vllm-gpu
        image: vllm/vllm-openai:gemma4
        command: ["/bin/bash", "-c"]
        args:
        - >
          pip install sentencepiece &&
          NUM_GPUS=$(nvidia-smi -L | wc -l);
          python3 -m vllm.entrypoints.openai.api_server --host=0.0.0.0 --port=8000 --model=${MODEL_PATH} --tensor-parallel-size=${NUM_GPUS} --max-model-len 65536 --served-model-name ${MODEL_NAME}
        ports:
        - containerPort: 8000
        resources:
          claims:
          - name: model
          - name: gpu
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-gemma-4-31b-it
spec:
  selector:
    app: vllm-gemma-4-31b-it
  type: LoadBalancer	
  ports:
    - name: http
      protocol: TCP
      port: 8000  
      targetPort: 8000
