{{- if .Values.webhook.enabled }}
{{- if .Values.webhook.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dra-driver-model-cache.webhookServiceAccountName" . }}
  namespace: {{ include "dra-driver-model-cache.namespace" . }}
  labels:
    {{- include "dra-driver-model-cache.labels" . | nindent 4 }}
  {{- with .Values.webhook.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
