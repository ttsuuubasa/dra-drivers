apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dra-driver-noop.fullname" . }}-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dra-driver-noop.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "dra-driver-noop.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
