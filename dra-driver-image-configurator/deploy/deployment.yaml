apiVersion: v1
kind: ServiceAccount
metadata:
  name: dra-driver-image-configurator
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dra-driver-image-configurator
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims/driver"]
    resourceNames: ["gpu.example.com", "cpu.example.com", "image-configurator.x-k8s.io"]
    verbs: ["associated-node:update", "arbitrary-node:update"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dra-driver-image-configurator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dra-driver-image-configurator
subjects:
  - kind: ServiceAccount
    name: dra-driver-image-configurator
    namespace: kube-system
---
# Lease for controller-runtime leader election.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dra-driver-image-configurator-leader-election
  namespace: kube-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dra-driver-image-configurator-leader-election
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dra-driver-image-configurator-leader-election
subjects:
  - kind: ServiceAccount
    name: dra-driver-image-configurator
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dra-driver-image-configurator
  namespace: kube-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dra-driver-image-configurator
  template:
    metadata:
      labels:
        app: dra-driver-image-configurator
    spec:
      serviceAccountName: dra-driver-image-configurator
      containers:
        - name: controller
          image: registry.k8s.io/dra-driver-image-configurator:latest
          imagePullPolicy: IfNotPresent
