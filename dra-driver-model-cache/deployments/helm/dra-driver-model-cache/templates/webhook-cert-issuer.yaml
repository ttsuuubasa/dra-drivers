{{- if .Values.webhook.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "dra-driver-model-cache.fullname" . }}-webhook-issuer
  namespace: {{ include "dra-driver-model-cache.namespace" . }}
  labels:
    {{- include "dra-driver-model-cache.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  selfSigned: {}
{{- end }}
