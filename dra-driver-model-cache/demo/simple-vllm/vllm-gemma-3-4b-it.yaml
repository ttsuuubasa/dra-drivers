apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gemma-3-4b-it
spec:
  spec:
    devices:
      requests:
      - name: tpu
        exactly:
          allocationMode: All
          deviceClassName: tpu.google.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gemma-3-4b-it
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-gemma-3-4b-it
  template:
    metadata:
      labels:
        app: vllm-gemma-3-4b-it
    spec:
      nodeSelector:
        cloud.google.com/compute-class: vllm-tpu-ccc
      tolerations:
      - key: "google.com/tpu"
        operator: "Exists"
        effect: "NoSchedule"
      resourceClaims:
      - name: tpu
        resourceClaimTemplateName: gemma-3-4b-it
      containers:
      - name: vllm-tpu
        image: vllm/vllm-tpu:latest
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: hf_api_token
        command: ["/bin/bash", "-c"]
        args:
        - "python3 -m vllm.entrypoints.openai.api_server --host=0.0.0.0 --port=8000 --model=google/gemma-3-4b-it --tensor-parallel-size=$(env | grep -E 'TPU_DEVICE_[0-9]+_RESOURCE_CLAIM' | wc -l)"
        ports:
        - containerPort: 8000
        resources:
          claims:
          - name: tpu
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-gemma-3-4b-it
spec:
  selector:
    app: vllm-gemma-3-4b-it
  type: LoadBalancer	
  ports:
    - name: http
      protocol: TCP
      port: 8000  
      targetPort: 8000
