name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed driver directories
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD)
            DIRS=$(echo "$CHANGED_FILES" | grep -E '^dra-driver-[^/]+/' | cut -d/ -f1 | sort -u || true)
          else
            DIRS=$(find . -maxdepth 1 -type d -name 'dra-driver-*' | sed 's|^\./||' | sort -u)
          fi

          VALID_DIRS=()
          for d in $DIRS; do
            if [ -d "$d" ] && [ -f "$d/go.mod" ]; then
              VALID_DIRS+=("$d")
            fi
          done

          if [ ${#VALID_DIRS[@]} -eq 0 ]; then
            JSON="[]"
          else
            JSON=$(python3 -c "import json, sys; print(json.dumps(sys.argv[1:]))" "${VALID_DIRS[@]}")
          fi

          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"

  fmt:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '${{ matrix.dir }}/go.mod'
          cache: true
          cache-dependency-path: '${{ matrix.dir }}/go.sum'

      - name: Check code formatting with gofmt
        run: |
          UNFORMATTED=$(gofmt -s -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted properly with 'gofmt -s -w':"
            echo "$UNFORMATTED"
            exit 1
          fi
        working-directory: ${{ matrix.dir }}

  lint:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '${{ matrix.dir }}/go.mod'
          cache: true
          cache-dependency-path: '${{ matrix.dir }}/go.sum'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          install-mode: goinstall
          working-directory: ${{ matrix.dir }}
          args: --timeout=5m

  test:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '${{ matrix.dir }}/go.mod'
          cache: true
          cache-dependency-path: '${{ matrix.dir }}/go.sum'

      - name: Run unit tests
        run: go test -v ./...
        working-directory: ${{ matrix.dir }}
